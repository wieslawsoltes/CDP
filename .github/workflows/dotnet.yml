name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-unit-tests:
    name: Test - ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: "Avalonia.Diagnostics.Cdp.Tests"
            project: "tests/Avalonia.Diagnostics.Cdp.Tests/Avalonia.Diagnostics.Cdp.Tests.csproj"
            filter: ""
          - os: ubuntu-latest
            name: "Avalonia.Diagnostics.Cdp.v11.Tests"
            project: "tests/Avalonia.Diagnostics.Cdp.v11.Tests/Avalonia.Diagnostics.Cdp.v11.Tests.csproj"
            filter: ""
          - os: ubuntu-latest
            name: "CDP.Inspector.CLI.Tests"
            project: "tests/CDP.Inspector.CLI.Tests/CDP.Inspector.CLI.Tests.csproj"
            filter: ""
          - os: ubuntu-latest
            name: "CDP.Diagnostics.IntegrationTests"
            project: "tests/CDP.Diagnostics.IntegrationTests/CDP.Diagnostics.IntegrationTests.csproj"
            filter: ""
          - os: ubuntu-latest
            name: "CDP.Rendering.Comparison.Tests"
            project: "tests/CDP.Rendering.Comparison.Tests/CDP.Rendering.Comparison.Tests.csproj"
            filter: ""
          - os: ubuntu-latest
            name: "Library Tests"
            project: "Avalonia.Diagnostics.Cdp.slnx"
            filter: "--filter 'FullyQualifiedName!~Avalonia.Diagnostics.Cdp.Tests&FullyQualifiedName!~CDP.Inspector.CLI.Tests&FullyQualifiedName!~CDP.Diagnostics.IntegrationTests&FullyQualifiedName!~CDP.Rendering.Comparison.Tests&FullyQualifiedName!~CDP.Selenium.Tests&FullyQualifiedName!~CDP.Appium.Tests'"

          - os: macos-latest
            name: "Avalonia.Diagnostics.Cdp.Tests"
            project: "tests/Avalonia.Diagnostics.Cdp.Tests/Avalonia.Diagnostics.Cdp.Tests.csproj"
            filter: ""
          - os: macos-latest
            name: "Avalonia.Diagnostics.Cdp.v11.Tests"
            project: "tests/Avalonia.Diagnostics.Cdp.v11.Tests/Avalonia.Diagnostics.Cdp.v11.Tests.csproj"
            filter: ""
          - os: macos-latest
            name: "CDP.Inspector.CLI.Tests"
            project: "tests/CDP.Inspector.CLI.Tests/CDP.Inspector.CLI.Tests.csproj"
            filter: ""
          - os: macos-latest
            name: "CDP.Diagnostics.IntegrationTests"
            project: "tests/CDP.Diagnostics.IntegrationTests/CDP.Diagnostics.IntegrationTests.csproj"
            filter: ""
          - os: macos-latest
            name: "CDP.Rendering.Comparison.Tests"
            project: "tests/CDP.Rendering.Comparison.Tests/CDP.Rendering.Comparison.Tests.csproj"
            filter: ""
          - os: macos-latest
            name: "Library Tests"
            project: "Avalonia.Diagnostics.Cdp.slnx"
            filter: "--filter 'FullyQualifiedName!~Avalonia.Diagnostics.Cdp.Tests&FullyQualifiedName!~CDP.Inspector.CLI.Tests&FullyQualifiedName!~CDP.Diagnostics.IntegrationTests&FullyQualifiedName!~CDP.Rendering.Comparison.Tests&FullyQualifiedName!~CDP.Selenium.Tests&FullyQualifiedName!~CDP.Appium.Tests'"

          - os: windows-latest
            name: "Avalonia.Diagnostics.Cdp.Tests"
            project: "tests/Avalonia.Diagnostics.Cdp.Tests/Avalonia.Diagnostics.Cdp.Tests.csproj"
            filter: ""
          - os: windows-latest
            name: "Avalonia.Diagnostics.Cdp.v11.Tests"
            project: "tests/Avalonia.Diagnostics.Cdp.v11.Tests/Avalonia.Diagnostics.Cdp.v11.Tests.csproj"
            filter: ""
          - os: windows-latest
            name: "CDP.Inspector.CLI.Tests"
            project: "tests/CDP.Inspector.CLI.Tests/CDP.Inspector.CLI.Tests.csproj"
            filter: ""
          - os: windows-latest
            name: "CDP.Diagnostics.IntegrationTests"
            project: "tests/CDP.Diagnostics.IntegrationTests/CDP.Diagnostics.IntegrationTests.csproj"
            filter: ""
          - os: windows-latest
            name: "CDP.Rendering.Comparison.Tests"
            project: "tests/CDP.Rendering.Comparison.Tests/CDP.Rendering.Comparison.Tests.csproj"
            filter: ""
          - os: windows-latest
            name: "Library Tests"
            project: "Avalonia.Diagnostics.Cdp.slnx"
            filter: "--filter 'FullyQualifiedName!~Avalonia.Diagnostics.Cdp.Tests&FullyQualifiedName!~CDP.Inspector.CLI.Tests&FullyQualifiedName!~CDP.Diagnostics.IntegrationTests&FullyQualifiedName!~CDP.Rendering.Comparison.Tests&FullyQualifiedName!~CDP.Selenium.Tests&FullyQualifiedName!~CDP.Appium.Tests'"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build CdpSampleApp for Tests
      run: dotnet build samples/CdpSampleApp/CdpSampleApp.csproj -c Release

    - name: Run Unit Tests
      shell: bash
      run: |
        if [ "${{ matrix.project }}" = "Avalonia.Diagnostics.Cdp.slnx" ]; then
          dotnet test ${{ matrix.project }} -c Release --verbosity normal -- RunConfiguration.MaxCpuCount=1 ${{ matrix.filter }}
        else
          dotnet test ${{ matrix.project }} -c Release --verbosity normal
        fi

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.name }}-${{ matrix.os }}
        path: |
          **/*.log
          **/*.png
          **/*.html

  build-pack-linux:
    name: Build & Pack (Linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build CdpSampleApp for Tests
      run: dotnet build samples/CdpSampleApp/CdpSampleApp.csproj -c Release

    - name: Publish Linux Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r linux-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/linux-x64

    - name: Build DEB Package
      run: |
        bash scripts/build-deb.sh --publish-dir ./publish/linux-x64 --version 1.0.0-pr --output ./artifacts

    - name: Run DEB Installer Integration Test
      run: |
        DEB_FILE=$(ls artifacts/cdp-inspector_*.deb | head -n 1)
        bash scripts/test-installer-linux.sh "$DEB_FILE"

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: linux-pack-logs
        path: |
          **/*.log
          **/*.png
          **/*.html

  build-pack-macos:
    name: Build & Pack (macOS)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build CdpSampleApp for Tests
      run: dotnet build samples/CdpSampleApp/CdpSampleApp.csproj -c Release

    - name: Publish macOS ARM64 Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r osx-arm64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/osx-arm64

    - name: Build macOS DMG
      run: |
        bash scripts/build-dmg.sh --publish-dir ./publish/osx-arm64 --version 1.0.0-pr --output ./artifacts

    - name: Run macOS DMG Installer Integration Test
      run: |
        bash scripts/test-installer-macos.sh ./artifacts/cdp-inspector-osx.dmg

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macos-pack-logs
        path: |
          **/*.log
          **/*.png
          **/*.html

  build-pack-windows:
    name: Build & Pack (Windows)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build CdpSampleApp for Tests
      shell: pwsh
      run: dotnet build samples/CdpSampleApp/CdpSampleApp.csproj -c Release

    - name: Publish Windows Executable
      shell: pwsh
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/win-x64

    - name: Build Windows MSI Installer
      shell: cmd
      run: |
        if not exist artifacts mkdir artifacts
        candle -arch x64 -dPublishDir=publish\win-x64 -dVersion=1.0.0 samples\CdpInspectorApp\cdp-inspector.wxs -o publish\win-x64\cdp-inspector.wixobj
        light publish\win-x64\cdp-inspector.wixobj -o artifacts\cdp-inspector-win-x64.msi

    - name: Run Windows MSI Installer Integration Test
      shell: pwsh
      run: |
        powershell -File scripts/test-installer-windows.ps1 -MsiPath artifacts/cdp-inspector-win-x64.msi

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-pack-logs
        path: |
          **/*.log
          **/*.png
          **/*.html

  pack-nuget:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: [run-unit-tests, build-pack-linux, build-pack-macos, build-pack-windows]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install WASM Tools workload
      run: dotnet workload install wasm-tools

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Pack NuGet Packages
      shell: bash
      run: |
        bash scripts/pack-nuget.sh --configuration Release --output artifacts --version 1.0.0-pr
