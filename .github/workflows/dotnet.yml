name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-suite:
    name: Test Suite
    uses: ./.github/workflows/test-suite.yml

  build-pack-linux:
    name: Build & Pack (Linux)
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish Linux Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r linux-x64 -p:PublishAot=false -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/linux-x64

    - name: Build DEB Package
      run: |
        bash scripts/build-deb.sh --publish-dir ./publish/linux-x64 --version 1.0.0-pr --output ./artifacts

    - name: Run DEB Installer Integration Test
      run: |
        DEB_FILE=$(ls artifacts/cdp-inspector_*.deb | head -n 1)
        bash scripts/test-installer-linux.sh "$DEB_FILE"

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: linux-pack-logs
        path: |
          **/*.log
          **/*.png
          **/*.html

  build-pack-macos:
    name: Build & Pack (macOS)
    runs-on: macos-latest
    needs: test-suite
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish macOS ARM64 Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r osx-arm64 -p:PublishAot=false -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/osx-arm64

    - name: Build macOS DMG
      run: |
        bash scripts/build-dmg.sh --publish-dir ./publish/osx-arm64 --version 1.0.0-pr --output ./artifacts

    - name: Run macOS DMG Installer Integration Test
      run: |
        bash scripts/test-installer-macos.sh ./artifacts/cdp-inspector-osx.dmg

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macos-pack-logs
        path: |
          **/*.log
          **/*.png
          **/*.html

  build-pack-windows:
    name: Build & Pack (Windows)
    runs-on: windows-latest
    needs: test-suite
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish Windows Executable
      shell: pwsh
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r win-x64 -p:PublishAot=false -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/win-x64

    - name: Build Windows MSI Installer
      shell: cmd
      run: |
        if not exist artifacts mkdir artifacts
        candle -arch x64 -dPublishDir=publish\win-x64 -dVersion=1.0.0 samples\CdpInspectorApp\cdp-inspector.wxs -o publish\win-x64\cdp-inspector.wixobj
        light publish\win-x64\cdp-inspector.wixobj -o artifacts\cdp-inspector-win-x64.msi

    - name: Run Windows MSI Installer Integration Test
      shell: pwsh
      run: |
        powershell -File scripts/test-installer-windows.ps1 -MsiPath artifacts/cdp-inspector-win-x64.msi

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-pack-logs
        path: |
          **/*.log
          **/*.png
          **/*.html

  pack-nuget:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: [test-suite, build-pack-linux, build-pack-macos, build-pack-windows]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: |
        for csproj in $(find src samples -name '*.csproj'); do
          if grep -Eqi '<IsPackable>[[:space:]]*false[[:space:]]*</IsPackable>' "$csproj"; then
            continue
          fi
          if [[ "$csproj" == *"CdpInspectorApp.Browser.csproj" ]]; then
            continue
          fi
          dotnet build "$csproj" --no-restore --configuration Release
        done

    - name: Pack NuGet Packages
      shell: bash
      run: |
        bash scripts/pack-nuget.sh --configuration Release --output artifacts --version 1.0.0-pr
