name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install WASM Tools workload
      run: dotnet workload install wasm-tools

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Publish Linux Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r linux-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/linux-x64

    - name: Build DEB Package
      run: |
        bash scripts/build-deb.sh --publish-dir ./publish/linux-x64 --version 1.0.0-pr --output ./artifacts

    - name: Run DEB Installer Integration Test
      run: |
        bash scripts/test-installer-linux.sh ./artifacts/cdp-inspector_1.0.0-pr_amd64.deb

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: |
          **/chromedriver.log
          **/playwright-webserver.log
          **/*.log
          **/*.png
          **/*.html
