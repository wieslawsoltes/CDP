name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
    - name: Validate release tag
      id: version
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if [[ "${{ github.ref_type }}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+ ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ ! "${version}" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              version="1.0.0-dispatch"
            fi
          else
            version="1.0.0-dispatch"
          fi
          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"
        else
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "${version}" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease, got ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"
        fi

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    needs: version
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Run Unit Tests
      run: |
        dotnet test tests/Avalonia.Diagnostics.Cdp.Tests/Avalonia.Diagnostics.Cdp.Tests.csproj -c Release --verbosity normal
        dotnet test tests/CDP.Selenium.Tests/CDP.Selenium.Tests.csproj -c Release --verbosity normal
        dotnet test tests/CDP.Appium.Tests/CDP.Appium.Tests.csproj -c Release --verbosity normal

    - name: Publish Linux Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r linux-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/linux-x64
        mkdir -p artifacts
        cd ./publish/linux-x64
        tar -czf ../../artifacts/cdp-inspector-linux-x64.tar.gz CdpInspectorApp
        cd ../..

    - name: Build DEB package
      run: |
        bash scripts/build-deb.sh --publish-dir ./publish/linux-x64 --version "${{ needs.version.outputs.VERSION }}" --output ./artifacts

    - name: Run DEB Installer Integration Test
      run: |
        DEB_FILE=$(ls artifacts/cdp-inspector_*.deb | head -n 1)
        bash scripts/test-installer-linux.sh "$DEB_FILE"

    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-artifacts
        path: |
          artifacts/cdp-inspector-linux-x64.tar.gz
          artifacts/cdp-inspector_*.deb

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    needs: version
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Run Unit Tests
      run: |
        dotnet test tests/Avalonia.Diagnostics.Cdp.Tests/Avalonia.Diagnostics.Cdp.Tests.csproj -c Release --verbosity normal
        dotnet test tests/CDP.Selenium.Tests/CDP.Selenium.Tests.csproj -c Release --verbosity normal
        dotnet test tests/CDP.Appium.Tests/CDP.Appium.Tests.csproj -c Release --verbosity normal

    - name: Publish macOS x64 Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r osx-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/osx-x64
        mkdir -p artifacts
        cd ./publish/osx-x64
        tar -czf ../../artifacts/cdp-inspector-osx-x64.tar.gz CdpInspectorApp
        cd ../..

    - name: Publish macOS ARM64 Executable
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r osx-arm64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/osx-arm64
        mkdir -p artifacts
        cd ./publish/osx-arm64
        tar -czf ../../artifacts/cdp-inspector-osx-arm64.tar.gz CdpInspectorApp
        cd ../..

    - name: Build macOS DMGs
      run: |
        # Build x64 DMG
        bash scripts/build-dmg.sh --publish-dir ./publish/osx-x64 --version "${{ needs.version.outputs.VERSION }}" --output ./artifacts
        mv artifacts/cdp-inspector-osx.dmg artifacts/cdp-inspector-osx-x64.dmg
        
        # Build arm64 DMG
        bash scripts/build-dmg.sh --publish-dir ./publish/osx-arm64 --version "${{ needs.version.outputs.VERSION }}" --output ./artifacts
        mv artifacts/cdp-inspector-osx.dmg artifacts/cdp-inspector-osx-arm64.dmg

    - name: Run macOS DMG Installer Integration Test
      run: |
        bash scripts/test-installer-macos.sh ./artifacts/cdp-inspector-osx-arm64.dmg

    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-artifacts
        path: |
          artifacts/cdp-inspector-osx-x64.tar.gz
          artifacts/cdp-inspector-osx-arm64.tar.gz
          artifacts/cdp-inspector-osx-x64.dmg
          artifacts/cdp-inspector-osx-arm64.dmg

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    needs: version
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Run Unit Tests
      shell: pwsh
      run: |
        dotnet test tests/Avalonia.Diagnostics.Cdp.Tests/Avalonia.Diagnostics.Cdp.Tests.csproj -c Release --verbosity normal
        dotnet test tests/CDP.Selenium.Tests/CDP.Selenium.Tests.csproj -c Release --verbosity normal
        dotnet test tests/CDP.Appium.Tests/CDP.Appium.Tests.csproj -c Release --verbosity normal

    - name: Publish Windows Executable
      shell: pwsh
      run: |
        dotnet publish samples/CdpInspectorApp/CdpInspectorApp.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/win-x64
        New-Item -ItemType Directory -Force -Path artifacts
        Compress-Archive -Path publish/win-x64/CdpInspectorApp.exe -DestinationPath artifacts/cdp-inspector-win-x64.zip -Force

    - name: Parse Numeric Version
      id: numeric_version
      shell: pwsh
      run: |
        $semver = "${{ needs.version.outputs.VERSION }}"
        $numeric = ($semver -split '-')[0]
        echo "numeric=$numeric" >> $env:GITHUB_OUTPUT

    - name: Build Windows MSI Installer
      shell: cmd
      run: |
        candle -arch x64 -dPublishDir=publish\win-x64 -dVersion=${{ steps.numeric_version.outputs.numeric }} samples\CdpInspectorApp\cdp-inspector.wxs -o publish\win-x64\cdp-inspector.wixobj
        light publish\win-x64\cdp-inspector.wixobj -o artifacts\cdp-inspector-win-x64.msi

    - name: Run Windows MSI Installer Integration Test
      shell: pwsh
      run: |
        powershell -File scripts/test-installer-windows.ps1 -MsiPath artifacts/cdp-inspector-win-x64.msi

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          artifacts/cdp-inspector-win-x64.zip
          artifacts/cdp-inspector-win-x64.msi

  pack-nuget:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: [version, build-linux, build-macos, build-windows]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install WASM Tools workload
      run: dotnet workload install wasm-tools

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Pack NuGet Packages
      shell: bash
      run: |
        bash scripts/pack-nuget.sh --configuration Release --output artifacts --version "${{ needs.version.outputs.VERSION }}"

    - name: Upload NuGet Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-artifacts
        path: artifacts/*.nupkg

  release:
    name: Create GitHub Release & Publish
    runs-on: ubuntu-latest
    needs: [version, build-linux, build-macos, build-windows, pack-nuget]
    permissions:
      contents: write
      packages: write
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.version.outputs.VERSION }}
        target_commitish: ${{ github.ref_name }}
        files: |
          artifacts/cdp-inspector-win-x64.zip
          artifacts/cdp-inspector-win-x64.msi
          artifacts/cdp-inspector-linux-x64.tar.gz
          artifacts/cdp-inspector_*.deb
          artifacts/cdp-inspector-osx-x64.tar.gz
          artifacts/cdp-inspector-osx-arm64.tar.gz
          artifacts/cdp-inspector-osx-x64.dmg
          artifacts/cdp-inspector-osx-arm64.dmg
          artifacts/*.nupkg
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') || contains(needs.version.outputs.VERSION, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push to NuGet
      if: env.NUGET_API_KEY != '' && github.event_name == 'push'
      shell: bash
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        NUGET_SOURCE: https://api.nuget.org/v3/index.json
      run: bash scripts/push-nuget.sh --directory artifacts
