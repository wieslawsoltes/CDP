appId: "CdpInspectorApp"
description: "Tests Simulation Preview usability features: Zoom, Pan, Fit Zoom, Window Frame toggle, and Window controls"
---
- delay: "1000"
- tapOn: "#TabSimulation"
- delay: "1000"
- assertTrue: "__raw_window.DataContext.Simulation != null"
- assertTrue: "__raw_window.DataContext.Simulation.ZoomLevel == 1.0"
- assertTrue: "__raw_window.DataContext.Simulation.IsFitZoomActive == true"
- tapOn: "#btnZoomIn"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.ZoomLevel == 1.25"
- assertTrue: "__raw_window.DataContext.Simulation.IsFitZoomActive == false"
- tapOn: "#btnZoomOut"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.ZoomLevel == 1.0"
- tapOn: "#btnTogglePanMode"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsPanModeActive == true"
- tapOn: "#btnTogglePanMode"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsPanModeActive == false"
- tapOn: "#chkWindowFrame"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsWindowFrameVisible == false"
- tapOn: "#chkWindowFrame"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsWindowFrameVisible == true"
- tapOn: "#btnToggleFitZoom"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsFitZoomActive == true"
