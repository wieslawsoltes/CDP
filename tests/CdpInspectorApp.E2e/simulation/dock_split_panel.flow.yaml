appId: "CdpInspectorApp"
description: "Tests simulation preview bottom split panel pin/unpin and expand/collapse toggles"
---
- delay: "1000"
- tapOn: "#TabSimulation"
- delay: "1000"
- assertTrue: "document.querySelector('#borderScreenshot') != null"
- assertTrue: "document.querySelector('#PART_HeaderButton') != null"
- tapOn: "#PART_HeaderButton"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsAdvancedToolsExpanded == true"
- tapOn: "#PART_PinButton"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsAdvancedToolsPinned == false"
- tapOn: "#PART_PinButton"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsAdvancedToolsPinned == true"
- tapOn: "#PART_HeaderButton"
- delay: "500"
- assertTrue: "__raw_window.DataContext.Simulation.IsAdvancedToolsExpanded == false"
