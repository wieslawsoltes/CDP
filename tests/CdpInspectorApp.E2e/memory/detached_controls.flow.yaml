appId: "CdpInspectorApp"
description: "Inspect detached visual controls and filter by detached only"
---
- delay: "1000"
- tapOn: "#TabMemory"
- delay: "1000"
- tapOn: "#btnTakeSnapshot"
- delay: "3000"
- tapOn: "#TabDetachedControls"
- delay: "1500"
- tapOn: "#chkDetachedOnly"
- delay: "1500"
- assertTrue: "Window.DataContext.Memory.DetachedControls != null"
