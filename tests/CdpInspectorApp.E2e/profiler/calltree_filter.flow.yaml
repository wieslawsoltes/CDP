appId: "CdpInspectorApp"
description: "Verify that searching and filtering by method name updates the Profiler SearchText correctly"
---
- runFlow: "shared/navigate_to_profiler.yaml"
- assertTrue: "Window.DataContext.Profiler.SearchText == null"
- inputText:
    selector: "#txtProfilerSearch"
    text: "Main"
- delay: "1000"
- assertTrue: "Window.DataContext.Profiler.SearchText == \"Main\""
