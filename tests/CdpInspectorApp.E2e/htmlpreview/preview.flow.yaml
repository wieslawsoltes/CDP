appId: "CdpInspectorApp"
description: "Verify HTML Preview tab and custom sandbox mode"
---
- runFlow: "shared/connect_to_sample.yaml"
- delay: "500"
- tapOn: "#TabHtmlPreview"
- delay: "500"
- assertTrue: "Window.DataContext.HtmlPreview != null"
- assertTrue: "!Window.DataContext.HtmlPreview.IsCustomMode"
- tapOn: "#chkCustomMode"
- delay: "500"
- assertTrue: "Window.DataContext.HtmlPreview.IsCustomMode"
- inputText:
    selector: "#txtCustomHtml"
    text: "<div class=\"test\">E2E Test Output</div>"
- delay: "500"
- assertTrue: "Window.DataContext.HtmlPreview.HtmlText.Contains(\"E2E Test Output\")"
