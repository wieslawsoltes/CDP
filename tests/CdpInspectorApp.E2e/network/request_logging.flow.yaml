appId: "CdpInspectorApp"
description: "Verify network request log viewing, throttling options, and mocking rules"
---
- runFlow: "shared/navigate_to_network.yaml"
- assertVisible: "#lstNetworkRequests"
- assertVisible: "#btnNetworkClear"
- assertVisible: "#cmbThrottling"
- tapOn: "#TabMockingRules"
- delay: "1000"
- assertVisible: "#btnAddMockRule"
- tapOn: "#btnAddMockRule"
- delay: "1000"
- assertVisible: "#lstMockRules"
