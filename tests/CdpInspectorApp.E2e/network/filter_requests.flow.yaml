appId: "CdpInspectorApp"
description: "Verify that the network request log can be filtered using the search filter text box"
---
- runFlow: "shared/navigate_to_network.yaml"
- assertVisible: "#txtNetworkFilter"
- assertVisible: "#lstNetworkRequests"
- evalScript: 'var vm = (CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext; vm.Network.NetworkRequests.Clear(); vm.Network.NetworkRequests.Add(new CdpInspectorApp.Models.NetworkRequestModel { RequestId = "req-1", Url = "http://example.com/api/users", Method = "GET", Type = "XHR" }); vm.Network.NetworkRequests.Add(new CdpInspectorApp.Models.NetworkRequestModel { RequestId = "req-2", Url = "http://example.com/static/style.css", Method = "GET", Type = "Stylesheet" });'
- delay: "1000"
- assertTrue: "((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Network.FilteredRequestsCount == 2"
- tapOn: "#txtNetworkFilter"
- delay: "500"
- inputText: "users"
- delay: "1000"
- assertTrue: "((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Network.FilteredRequestsCount == 1"
- tapOn: "#txtNetworkFilter"
- delay: "500"
- clearText: "#txtNetworkFilter"
- delay: "1000"
- assertTrue: "((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Network.FilteredRequestsCount == 2"
