appId: "CdpInspectorApp"
description: "Evaluate script expressions in REPL and verify printed results"
---
- runFlow: "shared/navigate_to_console.yaml"
- inputText:
    selector: "#txtConsoleInput"
    text: "40 + 2"
- delay: "1000"
- tapOn: "#btnSendConsole"
- delay: "1000"
- assertTrue: "Window.DataContext.Console.ConsoleHistory.Count > 0"
- assertTrue: "Window.DataContext.Console.ConsoleHistory[Window.DataContext.Console.ConsoleHistory.Count - 1].Result == \"42\""
