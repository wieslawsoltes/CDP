appId: "CdpInspectorApp"
description: "Connect to target sample application and then disconnect"
---
- delay: "1000"
- tapOn: "#btnRefreshTargets"
- delay: "2000"
- tapOn: "#btnConnect"
- delay: "2000"
- assertTrue: "__raw_window.DataContext.Connection.IsConnected"
- tapOn: "#btnDisconnect"
- delay: "2000"
- assertTrue: "!__raw_window.DataContext.Connection.IsConnected"
