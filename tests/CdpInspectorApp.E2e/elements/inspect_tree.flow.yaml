- delay: "1000"
- tapOn: "#TabElements"
- delay: "1000"
- tapOn: "#TabDomTree"
- delay: "1000"
- tapOn: "#chkVisualTree"
- delay: "1000"
- inputText:
    selector: "#txtSearch"
