appId: "CdpInspectorApp"
description: "Verify global application resource dictionary entries"
---
- delay: "1000"
- tapOn: "#TabApplication"
- delay: "1000"
- assertVisible: "#lstApplicationResources"
- tapOn: "#btnRefreshResources"
- delay: "1000"
- inputText:
    selector: "#txtResourceKey"
    text: "TestColor"
- delay: "500"
- inputText:
    selector: "#txtResourceValue"
    text: "#FF0000"
- delay: "500"
- tapOn: "#btnAddResource"
- delay: "1000"
- assertTrue: "true"
