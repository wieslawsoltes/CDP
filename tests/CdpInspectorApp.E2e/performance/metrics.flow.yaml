appId: "CdpInspectorApp"
description: "Verify performance monitor metrics and CPU profiler control"
---
- delay: "1000"
- tapOn: "#TabPerformance"
- delay: "1000"
- assertVisible: "#PerformanceChartPanel"
- tapOn: "#btnRefreshMetrics"
- delay: "1000"
- tapOn: "#btnCollectGarbage"
- delay: "1000"
- tapOn: "#btnStartProfiler"
- delay: "2000"
- tapOn: "#btnStopProfiler"
- delay: "1000"
- assertVisible: "#lblPerfMemory"
- assertTrue: "true"
