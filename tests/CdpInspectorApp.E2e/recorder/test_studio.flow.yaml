appId: "CdpInspectorApp"
description: "E2E Test Flow for CdpInspectorApp YAML Synchronizer and Replay"
---
- delay: "2000"
- tapOn: "#TabRecorder"
- delay: "1000"
- assertTrue: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps.Count == 0'
- evalScript: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.YamlCode = "appId: \"CdpSampleApp\"\ndescription: \"Applied Flow\"\n---\n- delay: 1000\n- delay: 2000\n"'
- delay: "500"
- tapOn: "#btnTestStudioApplyYaml"
- delay: "1000"
- assertTrue: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps.Count == 2'
- assertTrue: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps[0].Action == "delay" && ((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps[0].Value == "1000"'
- assertTrue: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps[1].Action == "delay" && ((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps[1].Value == "2000"'
- tapOn: "#btnTestStudioPlay"
- delay: "4000"
- assertFalse: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.IsExecuting == true'
- assertTrue: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps[0].Status.ToString() == "Passed"'
- assertTrue: '((CdpInspectorApp.ViewModels.MainWindowViewModel)Window.DataContext).Recorder.TestStudio.Steps[1].Status.ToString() == "Passed"'
